<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pruebas — Gestor de tareas (EXP-005)</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; }
    .pass { color: green; }
    .fail { color: red; }
    .not-run { color: #6b7280; }
    .summary { margin: 1rem 0; padding: 0.75rem; border: 1px solid #d1d5db; }
    .suite-pass { border-left: 4px solid green; }
    .suite-fail { border-left: 4px solid red; }
  </style>
</head>
<body>
  <h1>Pruebas EXP-005</h1>
  <p>
    Ejecución mediante HTTP. Modos de control:
    <code>?mode=assertion-failure</code>,
    <code>?mode=exception</code> y
    <code>?mode=skip</code>.
  </p>

  <div id="summary" class="summary" aria-live="polite">Preparando pruebas…</div>
  <ol id="results"></ol>

  <iframe
    id="index-frame"
    src="index.html"
    title="index.html (verificación de dependencias)"
    hidden
  ></iframe>

  <script src="app.js"></script>
  <script src="test-runner.js"></script>

</html>
