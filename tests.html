<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pruebas — Gestor de tareas (EXP-002)</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; }
    .pass { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>
  <h1>Pruebas EXP-002</h1>
  <ul id="results"></ul>

  <script src="app.js"></script>
  <script>
    const resultsList = document.getElementById('results');

    function report(name, passed, details) {
      const li = document.createElement('li');
      li.className = passed ? 'pass' : 'fail';
      li.textContent = (passed ? 'PASS' : 'FAIL') + ' - ' + name + (details ? ' (' + details + ')' : '');
      resultsList.appendChild(li);
    }

    function resetStorage() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function runTests() {
      resetStorage();

      // 1. Un título válido crea y muestra una tarea.
      const created = createTask('Tarea de prueba');
      const list = document.createElement('ul');
      renderTasks(list);
      const shown = Array.from(list.querySelectorAll('li'))
        .some((li) => li.textContent.indexOf('Tarea de prueba') !== -1);
      report(
        'Un título válido crea y muestra una tarea',
        created !== null && loadTasks().length === 1 && shown
      );

      // 2. Un título vacío no crea ni guarda una tarea.
      const invalidEmpty = createTask('');
      report(
        'Un título vacío no crea ni guarda una tarea',
        invalidEmpty === null && loadTasks().length === 1
      );

      // 3. Un título compuesto únicamente por espacios no crea ni guarda una tarea.
      const invalidSpaces = createTask('   ');
      report(
        'Un título de solo espacios no crea ni guarda una tarea',
        invalidSpaces === null && loadTasks().length === 1
      );

      // 4. Se muestra el mensaje de error esperado.
      const errorEl = document.createElement('p');
      errorEl.hidden = true;
      showTitleError(errorEl);
      report(
        'Se muestra el mensaje de error esperado',
        errorEl.hidden === false && errorEl.textContent === TASK_TITLE_ERROR_MESSAGE
      );

      // 5. Una tarea válida elimina u oculta el mensaje de error.
      hideTitleError(errorEl);
      report('Una tarea válida oculta el mensaje de error', errorEl.hidden === true);

      // 6. Marcar una tarea como completada sigue funcionando.
      completeTask(created.id);
      const afterComplete = loadTasks().find((t) => t.id === created.id);
      report(
        'Marcar una tarea como completada sigue funcionando',
        !!afterComplete && afterComplete.completed === true
      );

      // 7. La persistencia mediante localStorage sigue funcionando.
      const rawAfter = localStorage.getItem(STORAGE_KEY);
      const parsed = JSON.parse(rawAfter);
      const persisted = Array.isArray(parsed) && parsed.length === 1 && parsed[0].completed === true;
      report('La persistencia mediante localStorage sigue funcionando', persisted);

      // 8. No se añadieron dependencias externas.
      const externalRefs = Array.from(document.querySelectorAll('script[src], link[href]'))
        .map((el) => el.getAttribute('src') || el.getAttribute('href'))
        .filter((ref) => /^(https?:)?\/\//i.test(ref));
      report('No se añadieron dependencias externas', externalRefs.length === 0, externalRefs.join(', '));

      resetStorage();
    }

    runTests();
  </script>
</body>
</html>
